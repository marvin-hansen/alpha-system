syntax = "proto3";
package proto;

import "imdb_messages.proto";

service IMDBService {
  rpc CountIntegrationConfigs (CountIntegrationRequest) returns (CountIntegrationResponse) {}
  rpc CheckIfIntegrationConfigExists (CheckIfIntegrationConfigExistsRequest) returns (CheckIfIntegrationConfigExistsResponse) {}
  rpc CheckIfIntegrationConfigOnline (CheckIfIntegrationConfigOnlineRequest) returns (CheckIfIntegrationConfigOnlineResponse) {}
  rpc GetIntegrationConfig (GetIntegrationConfigRequest) returns (GetIntegrationConfigResponse) {}
  rpc GetAllIntegrationConfigs (GetAllIntegrationsRequest) returns (GetAllIntegrationsResponse) {}
  rpc GetAllIntegrationConfigsByExchange (GetAllIntegrationsByExchangeRequest) returns (GetAllIntegrationsByExchangeResponse) {}
  rpc GetAllOnlineIntegrationConfigs(GetAllOnlineIntegrationsRequest) returns (GetAllOnlineIntegrationsResponse) {}
  rpc GetAllOfflineIntegrationConfigs(GetAllOfflineIntegrationsRequest) returns (GetAllOfflineIntegrationsResponse) {}
  rpc SetIntegrationOnline(SetIntegrationOnlineRequest) returns (SetIntegrationOnlineResponse) {}
  rpc SetIntegrationOffline(SetIntegrationOfflineRequest) returns (SetIntegrationOfflineResponse) {}
}

// Service definitions: https://developers.google.com/protocol-buffers/docs/proto3#services
service DBGatewayIMDBService {
  rpc CreateIntegrationConfig (CreateIntegrationRequest) returns (CreateIntegrationResponse) {}
  rpc CountIntegrationConfigs (CountIntegrationRequest) returns (CountIntegrationResponse) {}
  rpc CheckIfIntegrationConfigExists (CheckIfIntegrationConfigExistsRequest) returns (CheckIfIntegrationConfigExistsResponse) {}
  rpc CheckIfIntegrationConfigOnline (CheckIfIntegrationConfigOnlineRequest) returns (CheckIfIntegrationConfigOnlineResponse) {}
  rpc GetIntegrationConfig (GetIntegrationConfigRequest) returns (GetIntegrationConfigResponse) {}
  rpc GetAllIntegrationConfigs (GetAllIntegrationsRequest) returns (GetAllIntegrationsResponse) {}
  rpc GetAllIntegrationConfigsByExchange (GetAllIntegrationsByExchangeRequest) returns (GetAllIntegrationsByExchangeResponse) {}
  rpc GetAllOnlineIntegrationConfigs(GetAllOnlineIntegrationsRequest) returns (GetAllOnlineIntegrationsResponse) {}
  rpc GetAllOfflineIntegrationConfigs(GetAllOfflineIntegrationsRequest) returns (GetAllOfflineIntegrationsResponse) {}
  rpc SetIntegrationOnline(SetIntegrationOnlineRequest) returns (SetIntegrationOnlineResponse) {}
  rpc SetIntegrationOffline(SetIntegrationOfflineRequest) returns (SetIntegrationOfflineResponse) {}
  rpc UpdateIntegrationConfig (UpdateIntegrationRequest) returns (UpdateIntegrationResponse) {}
  rpc DeleteIntegrationConfig (DeleteIntegrationRequest) returns (DeleteIntegrationResponse) {}
}