---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dbgw
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./delivery/app/core/dbgw
  prune: true
  targetNamespace: default
  timeout: 5m0s
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: smdb
  namespace: flux-system
spec:
  dependsOn:
    - name: dbgw
  interval: 10m0s
  path: ./delivery/app/core/smdb
  prune: true
  targetNamespace: default
  timeout: 5m0s
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
---

