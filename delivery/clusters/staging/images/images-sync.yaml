---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: image-repositories
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./delivery/images/staging
  prune: true
  targetNamespace: default
  timeout: 5m0s
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---