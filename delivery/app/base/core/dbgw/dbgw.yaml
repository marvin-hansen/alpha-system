---
apiVersion: v1
kind: Service
metadata:
  name: dbgw-service
  namespace: default
spec:
  selector:
    app: dbgw
  sessionAffinity: None
  type: ClusterIP
  ports:
    - name: main-port
      port: 7070
      protocol: TCP
      targetPort: 7070
    - name: metrics-port
      port: 8080
      protocol: TCP
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbgw
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dbgw
  template:
    metadata:
      labels:
        app: dbgw
    spec:
      imagePullSecrets:
        - name: artifact-registry
      containers:
        - name: dbgw
          # https://console.cloud.google.com/artifacts/docker/future-309012/asia-northeast1/image-repo/dbgw
          image: asia-northeast1-docker.pkg.dev/future-309012/image-repo/dbgw:d6c97cc
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          ports:
            - containerPort: 7070
            - containerPort: 8080
          env:
            - name: ENV
              value: "CLUSTER"
            - name: DNS_SERVER
              valueFrom:
                secretKeyRef:
                  name: dns-access
                  key: DNS_SERVER
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: password
            - name: PG_DATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-db
                  key: database

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
---
