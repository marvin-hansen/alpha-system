---
apiVersion: v1
kind: Service
metadata:
  name: dbgw-service
  namespace: default
spec:
  selector:
    app: dbgw
  sessionAffinity: None
  type: ClusterIP
  ports:
    - name: main-port
      port: 9090
      protocol: TCP
      targetPort: 9090
    - name: metrics-port
      port: 8080
      protocol: TCP
      targetPort: 8080
---