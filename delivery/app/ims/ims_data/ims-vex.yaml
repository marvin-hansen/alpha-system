---
apiVersion: v1
kind: Service
metadata:
  name: vex-service
  namespace: default

spec:
  selector:
    app: vex
  sessionAffinity: None
  type: ClusterIP
  ports:
    - name: main-port
      port: 7070
      protocol: TCP
      targetPort: 7070
    - name: metrics-port
      port: 8080
      protocol: TCP
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vex
  namespace: default

spec:
  replicas: 1
  selector:
    matchLabels:
      app: vex
  template:
    metadata:
      labels:
        app: vex
    spec:
      imagePullSecrets:
        - name: artifact-registry
      containers:
        - name: vex
          image: asia-northeast1-docker.pkg.dev/future-309012/image-repo/vex:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ENV
              value: "CLUSTER"

            - name: DNS_SERVER
              valueFrom:
                secretKeyRef:
                  name: dns-access
                  key: DNS_SERVER

          ports:
            - containerPort: 7070
            - containerPort: 8080

          livenessProbe:
            grpc:
              port: 7070
            initialDelaySeconds: 3
            failureThreshold: 1
            periodSeconds: 3

          startupProbe:
            grpc:
              port: 7070
            initialDelaySeconds: 1
            failureThreshold: 10
            periodSeconds: 3

