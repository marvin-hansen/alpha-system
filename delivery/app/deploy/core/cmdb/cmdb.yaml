---
apiVersion: v1
kind: Service
metadata:
  name: cmdb-service
  namespace: default

spec:
  selector:
    app: cmdb
  sessionAffinity: None
  type: ClusterIP
  ports:
    - name: main-port
      port: 7070
      protocol: TCP
      targetPort: 7070
    - name: metrics-port
      port: 8080
      protocol: TCP
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmdb
  namespace: default

spec:
  replicas: 1
  selector:
    matchLabels:
      app: cmdb
  template:
    metadata:
      labels:
        app: cmdb
    spec:
      imagePullSecrets:
        - name: artifact-registry
      containers:
        - name: cmdb
          image: asia-northeast1-docker.pkg.dev/future-309012/image-repo/cmdb:9e9da5d1-20241013095625 # {"$imagepolicy": "default:cmdb-image-policy"}
          imagePullPolicy: IfNotPresent
          env:
            - name: ENV
              value: "CLUSTER"

            - name: DNS_SERVER
              valueFrom:
                secretKeyRef:
                  name: dns-access
                  key: DNS_SERVER

          ports:
            - containerPort: 7070
            - containerPort: 8080

          livenessProbe:
            grpc:
              port: 7070
            initialDelaySeconds: 3
            failureThreshold: 1
            periodSeconds: 3

          startupProbe:
            grpc:
              port: 7070
            initialDelaySeconds: 1
            failureThreshold: 10
            periodSeconds: 3

