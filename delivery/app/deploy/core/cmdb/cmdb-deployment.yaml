---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmdb
  namespace: default

spec:
  replicas: 3
  selector:
    matchLabels:
      app: cmdb
  template:
    metadata:
      labels:
        app: cmdb
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: artifact-registry
      containers:
        - name: cmdb
          image: asia-northeast1-docker.pkg.dev/future-309012/image-repo/cmdb:0eea2944-1729054086 # {"$imagepolicy": "default:cmdb-image-policy"}
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 16Mi
            limits:
              cpu: 250m
              memory: 32Mi
          ports:
            - containerPort: 7070
            - containerPort: 8080
          env:
            - name: ENV
              value: "CLUSTER"

            - name: DNS_SERVER
              valueFrom:
                secretKeyRef:
                  name: dns-access
                  key: DNS_SERVER

          readinessProbe:
            grpc:
              port: 7070
            initialDelaySeconds: 1
            failureThreshold: 3
            periodSeconds: 3

          livenessProbe:
            grpc:
              port: 7070
            initialDelaySeconds: 3
            failureThreshold: 1
            periodSeconds: 3

          startupProbe:
            grpc:
              port: 7070
            initialDelaySeconds: 1
            failureThreshold: 10
            periodSeconds: 3

