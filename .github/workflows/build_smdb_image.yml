name: build_smdb_image

on:
  push:
    branches:
      - "main"

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy Dockerfile to project root
        run: cp queng_specs/service_specs/src/services/smdb/Dockerfile .

      - name: Set up Docker Buildx
        run: docker buildx create --use

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push image
        run: docker buildx build \
              --file Dockerfile \
              --platform linux/arm64 \
              --tag ghcr.io/marvin-hansen/quant-engine/smdb:latest \
              --push .

#      - name: Build and push
#        uses: docker/build-push-action@v5
#        with:
#          context: .
#          platforms: linux/arm64
#          push: true
#          tags: |
#            ghcr.io/marvin-hansen/quant-engine/smdb:latest

      - name: Delete Dockerfile
        run: rm Dockerfile
