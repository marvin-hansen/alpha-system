actions:

  - name: "Build and test all targets"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    bazel_commands:
      - "build -c opt //..."
      - "test -c opt  //..."

  - name: "Build all service binaries"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    bazel_commands:
      - "build -c opt //queng_services:build"

  - name: "Build all docs"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    bazel_commands:
      - "build -c opt //:doc"

  - name: "Build and publish all images"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    bazel_commands:
      - "bazel run :buildbuddy_setup_docker_auth --verbose_failures"
      - "build -c opt //queng_services:build --verbose_failures"
      - "build -c opt //:image --verbose_failures"
      - "run -c opt //:push  --verbose_failures"
