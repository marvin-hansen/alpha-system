actions:
  - name: "Build and test all targets"
    container_image: ubuntu-20.04
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    bazel_commands:
      - "build -c opt //..."
      - "build -c opt //:doc"
      - "test -c opt  //..."

  - name: "Build and publish all images"
    container_image: ubuntu-20.04
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    bazel_commands:
      - "run   -c opt //:buildbuddy_setup_docker_auth --verbose_failures"
      - "build -c opt //:build"
      - "build -c opt //:image"
      - "run   -c opt //:push --workspace_status_command 'tools/workspace_status.sh'"