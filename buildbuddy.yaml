actions:
  - name: "Build and test all targets"
    resource_request:
      memory: 8Gi
      cpu: 8
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    bazel_commands:
      - "build -c opt //:image  --config=remote"
      - "build -c opt //:doc --config=remote"
      - "test -c opt  //...  --config=remote"

  - name: "Build and publish all images"
    resource_request:
      memory: 8Gi
      cpu: 8
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    bazel_commands:
      - "run   -c opt //:buildbuddy_setup_docker_auth --verbose_failures"
      - "build -c opt //:image  --config=remote"
      - "run   -c opt //:push   --config=remote"