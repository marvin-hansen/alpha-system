actions:

  - name: "Build and test all targets"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    bazel_commands:
      - "build -c opt //..."
      - "test -c opt  //..."

  - name: "Build all service binaries"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    bazel_commands:
      - "build -c opt //queng_services:build"

  - name: "Build all docs"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    bazel_commands:
      - "build -c opt //:doc"

  - name: "Build and publish all images"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    bazel_commands:
      - "build -c opt //queng_services:build"
      - "--bazelrc=ci.bazelrc build -c opt //:image"
      - "--bazelrc=ci.bazelrc run -c opt //:push"