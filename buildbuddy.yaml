actions:
  - name: "Build, test and publish all containers"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "main"
    bazel_commands:
      # Setup & Authenticate
      - "run -c opt //:buildbuddy_setup_docker_auth --verbose_failures"
      # Build all targets with remote
      # Do NOT disable remote, otherwise the missing lib .. makes the workflow build fail.
      - "build -c opt //... --config=remote"
      # Build & test all docs
      - "build -c opt //... --build_tag_filters=doc --config=remote"
      - "build -c opt //... --build_tag_filters=doc-test --config=remote"
      - "test  -c opt //... --test_tag_filters=doc-test --config=remote"
      # Test: Run unit tests only
      - "build -c opt  //...  --build_tag_filters=unit --config=remote"
      - "test -c opt   //...  --test_tag_filters=unit --config=remote"
      # Test: integration test setup
     #  - "test -c opt  //...   --test_tag_filters=env_container_setup --config=remote"
      # - "test -c opt  //...    --test_tag_filters=kaiko_utils --config=remote"
      # - "test -c opt  //...    --test_tag_filters=clickhouse_utils --config=remote"
      # Build & publish images to container registry
      - "run   -c opt //:push --config=remote"
    resource_requests:
      cpu: 8  # Add more cpu for Docker
      memory: "12GB" # Add more memory to cross compile and prevent OOM.
      disk: "20GB"  # Default