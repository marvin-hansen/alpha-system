actions:
  - name: "Build, test and publish all containers"
    triggers:
      push:
        branches:
          - "main"
  # Renovate Bot triggers too many builds. Disabled PR builds.
  #      pull_request:
  #        branches:
  #          - "main"
    # When adding new bazel commands, also update scripts/test.sh script with the same command for local testing
    bazel_commands:
      # Setup & Authenticate
      - "run -c opt //:buildbuddy_setup_docker_auth --verbose_failures"
      # Build all targets with remote. Do NOT disable remote, otherwise the missing lib .. makes the workflow build fail.
      - "build -c opt //...  --config=remote"
      # Rust tests: Unit, Doc tests, & binary-integrity tests
      - "test  -c opt //...  --test_tag_filters=unit-test,doc-test,ci-binary-integrity_test --test_env=ENV=CI --config=remote"
      # Integration tests
      - "test -c opt  //...  --test_tag_filters=test-setup --test_env=ENV=CI --config=remote"
      - "test -c opt  //...  --test_tag_filters=test-setup,integration_test --test_env=ENV=CI --config=remote"
      # Build & publish container images to container registry
      - "run   -c opt //:push --config=remote"
    resource_requests:
      cpu: 4  # Default plus one
      memory: "8GB" # Default
      disk: "20GB"  # Default