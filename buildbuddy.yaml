actions:
  - name: "Build, test and publish all containers"
    triggers:
      push:
        branches:
          - "main"
# Renovate Bot triggers too many builds. Disabled PR builds.
#      pull_request:
#        branches:
#          - "main"
    # When adding new bazel commands, also update scripts/test.sh script with the same command for local testing
    bazel_commands:
      # Setup & Authenticate
      - "run -c opt //:buildbuddy_setup_docker_auth --verbose_failures"
      # Build all targets with remote. Do NOT disable remote, otherwise the missing lib .. makes the workflow build fail.
      - "build -c opt //... --config=remote"
      # Build & test all docs
      - "build -c opt //... --build_tag_filters=doc --config=remote"
      - "test  -c opt //... --test_tag_filters=doc-test --config=remote"
      # Unit tests
      - "test -c opt   //...  --test_tag_filters=unit --config=remote"
      # Integration tests
      # Container CI setup
      - "test -c opt  //...   --test_tag_filters=env_container_setup --config=remote"
      # Test: API Proxy integration
      - "test -c opt  //...   --test_tag_filters=kaiko_utils_integration_tests --config=remote"
      # Test: Clickhouse Integration
      - "test -c opt  //...   --test_tag_filters=clickhouse_utils_integration_tests --config=remote"
      # Build & publish container images to container registry
      - "run   -c opt //:push --config=remote"
    resource_requests:
      cpu: 4  # Add 1 more core for Docker
      memory: "8GB" # Default
      disk: "20GB"  # Default