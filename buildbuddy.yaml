actions:
  - name: "Build, test and publish all containers"
    container_image: ubuntu-20.04
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "main"
    bazel_commands:
      # Setup & Authenticate
      - "run -c opt //:buildbuddy_setup_docker_auth --verbose_failures"
      # Build all targets
      - "build -c opt //..."
      # Build & test all docs
      - "build -c opt //... --build_tag_filters=doc"
      - "build -c opt //... --build_tag_filters=doc-test"
      - "test  -c opt //... --test_tag_filters=doc-test "
      # Test: Run unit tests, prepare env setup for CI, and run integration tests
      - "test -c opt  //...         --test_tag_filters=unit"
      # - "test -c opt  //...  -cache --test_tag_filters=env_setup"
      # - "test -c opt  //...  -cache --test_tag_filters=clickhouse_utils "
      # Build & publish images to container registry
      - "run   -c opt //:push"
    resource_requests:
      cpu: 8  # Add more CPU for Docker
      memory: "8GB" # Default
      disk: "20GB"  # Default