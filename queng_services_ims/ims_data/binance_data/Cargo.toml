# Internal crates
common = {workspace = true}
config_manager = {workspace = true}
ctx_manager = {workspace = true}
dns_manager = {workspace = true}
lib_data_stream = {workspace = true}
proto_bindings = {workspace = true}
service_utils = {workspace = true}
smdb_provider = {workspace = true}
# External crates
binance-rs-async = { workspace = true }
chrono = { workspace = true }
futures = { workspace = true }
serde = {workspace = true}
tokio = { workspace = true }
tonic = { workspace = true }
prost = { workspace = true }
