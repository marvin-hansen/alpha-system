apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: quant-engine
  labels:
    version: v1
    app: dbgw
  name: dbgw-v1
spec:
  replicas: 3
  selector:
    matchLabels:
      version: v1
      app: dbgw
  template:
    metadata:
      labels:
        version: v1
        app: dbgw
      annotations:
        kubesphere.io/imagepullsecrets: '{"container-lgcl11":"artifact-registry"}'
    spec:
      containers:
        - name: dbgw
          image: 'asia-northeast1-docker.pkg.dev/future-309012/image-repo/dbgw:latest'
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 32Mi
              nvidia.com/gpu: '0'
            limits:
              cpu: 250m
              memory: 128Mi
              nvidia.com/gpu: '0'
          ports:
            - name: tcp-service
              protocol: TCP
              containerPort: 7070
              servicePort: 7070
            - name: tcp-metric
              protocol: TCP
              containerPort: 8080
              servicePort: 8080
          env:
            - name: ENV
              value: CLUSTER
            - name: DNS_SERVER
              valueFrom:
                secretKeyRef:
                  name: dns-access
                  key: DNS_SERVER
      serviceAccount: default
      terminationGracePeriodSeconds: 30
      initContainers: []
      volumes: []
      imagePullSecrets:
        - name: artifact-registry
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
---
apiVersion: v1
kind: Service
metadata:
  namespace: quant-engine
  labels:
    version: v1
    app: dbgw
  annotations:
    kubesphere.io/serviceType: statelessservice
  name: dbgw-service
spec:
  selector:
    app: dbgw
  sessionAffinity: None
  type: ClusterIP
  ports:
    - name: tcp-service
      protocol: TCP
      port: 7070
      targetPort: 7070
    - name: tcp-metric
      protocol: TCP
      port: 8080
      targetPort: 8080
