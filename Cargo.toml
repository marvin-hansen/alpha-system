common_order_ext = { path = "alpha_extensions/common_order_ext" }
cow_ext = { path = "alpha_extensions/cow_ext" }

# Import
# Core
config_import = { path = "alpha_import/core/config_import" }
integration_import = { path = "alpha_import/core/integration_import" }
metadata_import = { path = "alpha_import/core/metadata_import" }
service_import = { path = "alpha_import/core/service_import" }
# Kaiko
kaiko_download = { path = "alpha_import/kaiko/kaiko_download" }
kaiko_import = { path = "alpha_import/kaiko/kaiko_import" }
kaiko_test_utils = { path = "alpha_import/kaiko/kaiko_test_utils" }
# Utils
pg_import_print_utils = { path = "alpha_import/postgres/pg_import_print_utils" }

# Infra

# Postgres DB
