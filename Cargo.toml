[workspace]
resolver = "2"


members = [
    "cli/smdb_manager",
    "cli/spec_manager",
    "cli/zmq_manager",
    "clients/dbgw_client",
    "common",
    "components/bar_manager",
    "components/cfg_manager",
    "components/ctx_manager",
    "components/db_manager",
    "components/dns_manager",
    "components/env_manager",
    "components/file_manager",
    "components/qd_manager",
    "components/svc_manager",
    "proto",
    "providers/cmdb_provider",
    "providers/smdb_provider",
    "sbe/sbe_bindings",
    "sbe/sbe_messages",
    "service_utils",
    "services/cmdb",
    "services/dbgw",
    "services/qdgw",
    "services/smdb",
    "specs"
]


[workspace.package]
edition = "2021"
rust-version = "1.74"
readme = "README.md"
repository = "https://github.com/marvin-hansen/quant-engine"
authors = ["Marvin Hansen <marvin.hansen@gmail.com>"]


[workspace.dependencies]
autometrics = { version = "1", features = ["prometheus-exporter"] }
async-std = "1.12"
ctrlc = "3.4"
fluvio = { version = "0.21" , default-features = false, features = ["rustls"] }
futures = "0.3"
hickory-resolver = { version = "0.24", default-features = false, features = ["tokio-runtime"] }
log = "0.4"
parquet = "49.0.0"
prost = "0.12"
prost-types = { version = "0.12", default-features = false }
rand = "0.8"
rust_decimal = "1.33"
rust_decimal_macros = "1.33"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
surrealdb = { version = "1", features = ["kv-mem"] }
tokio = { version = "1", features = ["macros", "net", "rt-multi-thread", "signal"] }
tonic-health = "0.10"
tonic = "0.10"
tonic-build = "0.10.2"
warp = { version = "0.3", features = ["multipart"] }


# Optimize all crates
[profile.release]
opt-level = 3
strip = true  # Automatically strip debug symbols from the binary
lto = true    # Enable Link Time Optimization (LTO)
codegen-units = 1 # Reduce Parallel Code Generation Units to Increase Optimization


# There's a Cargo feature named profile-overrides
# that lets you override the optimization level of dependencies.
# https://docs.rust-embedded.org/book/unsorted/speed-vs-size.html
[profile.release.package."*"]
opt-level = 3
strip = true  # Automatically strip debug symbols from the binary to reduce size
codegen-units = 1 # Reduce Parallel Code Generation Units to Increase Optimization
