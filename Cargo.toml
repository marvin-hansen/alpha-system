# Container specs
container_specs_clickhouse = { path = "queng_specs/container_specs/container_specs_clickhouse" }
container_specs_iggy = { path = "queng_specs/container_specs/container_specs_iggy" }
container_specs_kaiko = { path = "queng_specs/container_specs/container_specs_kaiko" }
container_specs_postgres = { path = "queng_specs/container_specs/container_specs_postgres" }
