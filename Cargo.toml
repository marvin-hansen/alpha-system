[workspace]
resolver = "2"

members = [
    "queng_common/common_config",
    "queng_common/common_container",
    "queng_common/common_errors",
    "queng_common/common_data_bar",
    "queng_common/common_database",
    "queng_common/common_env",
    "queng_common/common_exchange",
    "queng_common/common_metadata",
    "queng_common/common_service",
    "queng_common/common_trade",
    "queng_components/config_manager",
    "queng_components/ctx_manager",
    "queng_components/dns_manager",
    "queng_components/pattern_manager",
    "queng_components/symbol_manager",
    "queng_infra/clickhouse/db_clickhouse_manager",
    "queng_infra/postgres/pg_cmdb",
    "queng_infra/postgres/postgres_migrations",
    "queng_infra/postgres/postgres_test_utils",
    "queng_infra/postgres/pg_smdb",
    "queng_infra/postgres/postgres_utils",
    "queng_infra/postgres/pg_mddb",
    "queng_infra/postgres/pg_cmdb_manager",
    "queng_infra/postgres/pg_smdb_manager",
    "queng_proto/proto_cmdb",
    "queng_proto/proto_cmdb_utils",
    "queng_proto/proto_imdb",
    "queng_proto/proto_mddb",
    "queng_proto/proto_mddb_utils",
    "queng_proto/proto_smdb",
    "queng_proto/proto_smdb_utils",
    "queng_sbe/bindings",
    "queng_sbe/sbe_messages",
    "queng_services/aux/kaiko_proxy",
    "queng_services/aux/kaiko_client",
    "queng_services/core/cmdb/cmdb_service",
    "queng_services/core/cmdb/cmdb_client",
    "queng_services/core/dbgw/dbgw_client",
    "queng_services/core/dbgw/dbgw_service",
    "queng_services/core/dbgw/dbgw_tests",
    "queng_services/meta/mddb/mddb_service",
    "queng_services/meta/mddb/mddb_client",
    "queng_services/core/smdb/smdb_service",
    "queng_services/core/smdb/smdb_client",
    "queng_services/ims/ims_clients/binance_client",
    "queng_services/ims/ims_clients/ims_data_client",
    "queng_services/ims/ims_clients/rest_client",
    "queng_services/ims/ims_common",
    "queng_services/ims/ims_data/binance_data",
    "queng_services/ims/ims_data/shared_data",
    "queng_services/aux/kaiko_tests",
    "queng_services/meta/mddb/mddb_tests",
    "queng_specs/portfolio_specs",
    "queng_specs/container_specs",
    "queng_specs/db_specs",
    "queng_specs/exchange_specs",
    "queng_specs/service_specs/ims/ims_data/ims_data_binance_specs",
    "queng_specs/service_specs/core/cmdb_specs",
    "queng_specs/service_specs/core/dbgw_specs",
    "queng_specs/service_specs/meta/mddb_specs",
    "queng_specs/service_specs/core/qdgw_specs",
    "queng_specs/service_specs/core/smdb_specs",
    "queng_specs/service_specs/ims/ims_data/ims_data_vex_specs",
    "queng_specs/service_specs/shared_service_specs",
    "queng_infra/clickhouse/clickhouse_utils",
    "queng_utils/math_utils",
    "queng_utils/specs_utils",
    "queng_utils/crypto_utils",
    "queng_utils_tests/docker_utils",
    "queng_utils_tests/env_utils",
    "queng_utils_tests/kaiko_utils",
    "queng_utils_tests/service_utils",
]


[workspace.package]
edition = "2021"
rust-version = "1.80.0"
readme = "README.md"
repository = "https://github.com/marvin-hansen/quant-engine"
authors = ["Marvin Hansen <marvin.hansen@gmail.com>"]


[workspace.dependencies]
#
# ==============
# Internal Aliases
# ==============
#
# Clients
binance_client = { path = "queng_services/ims/ims_clients/binance_client" }
cmdb_client = { path = "queng_services/core/cmdb/cmdb_client" }
dbgw_client = { path = "queng_services/core/dbgw/dbgw_client" }
ims_data_client = { path = "queng_services/ims/ims_clients/ims_data_client" }
kaiko_client = { path = "queng_services/aux/kaiko_client" }
rest_client = { path = "queng_services/ims/ims_clients/rest_client" }
mddb_client = { path = "queng_services/meta/mddb/mddb_client" }
smdb_client = { path = "queng_services/core/smdb/smdb_client" }
# Common
common_config = { path = "queng_common/common_config" }
common_container = { path = "queng_common/common_container" }
common_data_bar = { path = "queng_common/common_data_bar" }
common_database = { path = "queng_common/common_database" }
common_env = { path = "queng_common/common_env" }
common_errors = { path = "queng_common/common_errors" }
common_exchange = { path = "queng_common/common_exchange" }
common_metadata = { path = "queng_common/common_metadata" }
common_service = { path = "queng_common/common_service" }
common_trade = { path = "queng_common/common_trade" }
# Components
config_manager = { path = "queng_components/config_manager" }
ctx_manager = { path = "queng_components/ctx_manager" }
dns_manager = { path = "queng_components/dns_manager" }
pattern_manager = { path = "queng_components/pattern_manager" }
symbol_manager = { path = "queng_components/symbol_manager" }
# Infra
# Clickhouse DB
clickhouse_utils = { path = "queng_infra/clickhouse/clickhouse_utils" }
db_clickhouse_manager = { path = "queng_infra/clickhouse/db_clickhouse_manager" }
# Postgres DB
pg_cmdb = { path = "queng_infra/postgres/pg_cmdb" }
pg_cmdb_manager = { path = "queng_infra/postgres/pg_cmdb_manager" }
pg_smdb = { path = "queng_infra/postgres/pg_smdb" }
pg_smdb_manager = { path = "queng_infra/postgres/pg_smdb_manager" }
pg_mddb = { path = "queng_infra/postgres/pg_mddb" }
postgres_migrations = { path = "queng_infra/postgres/postgres_migrations" }
postgres_test_utils = { path = "queng_infra/postgres/postgres_test_utils" }
postgres_utils = { path = "queng_infra/postgres/postgres_utils" }

# Proto
proto_cmdb = { path = "queng_proto/proto_cmdb" }
proto_cmdb_utils = { path = "queng_proto/proto_cmdb_utils" }
proto_imdb = { path = "queng_proto/proto_imdb" }
proto_mddb = { path = "queng_proto/proto_mddb" }
proto_mddb_utils = { path = "queng_proto/proto_mddb_utils" }
proto_smdb = { path = "queng_proto/proto_smdb" }
proto_smdb_utils = { path = "queng_proto/proto_smdb_utils" }
# SBE
sbe_bindings = { path = "queng_sbe/bindings" }
sbe_messages = { path = "queng_sbe/sbe_messages" }
# IMS
ims_common = { path = "queng_services/ims/ims_common" }
lib_data_stream = { path = "queng_services/ims/ims_data/shared_data" }
# Specs
container_specs = { path = "queng_specs/container_specs" }
portfolio_specs = { path = "queng_specs/portfolio_specs" }
db_specs = { path = "queng_specs/db_specs" }
exchange_specs = { path = "queng_specs/exchange_specs" }
# IMS Specs
ims_data_binance_specs = { path = "queng_specs/service_specs/ims/ims_data/ims_data_binance_specs" }
# Service specs
cmdb_specs = { path = "queng_specs/service_specs/core/cmdb_specs" }
dbgw_specs = { path = "queng_specs/service_specs/core/dbgw_specs" }
mddb_specs = { path = "queng_specs/service_specs/meta/mddb_specs" }
qdgw_specs = { path = "queng_specs/service_specs/core/qdgw_specs" }
smdb_specs = { path = "queng_specs/service_specs/core/smdb_specs" }
ims_data_vex_specs = { path = "queng_specs/service_specs/ims/ims_data/ims_data_vex_specs" }
shared_service_specs = { path = "queng_specs/service_specs/shared_service_specs" }
# Utils
crypto_utils = { path = "queng_utils/crypto_utils" }
math_utils = { path = "queng_utils/math_utils" }
specs_utils = { path = "queng_utils/specs_utils" }
# Utils - Tests
docker_utils = { path = "queng_utils_tests/docker_utils" }
env_utils = { path = "queng_utils_tests/env_utils" }
kaiko_utils = { path = "queng_utils_tests/kaiko_utils" }
service_utils = { path = "queng_utils_tests/service_utils" }
#
# ==============
# External crates
# ==============
#
# Custom Memory Allocator
mimalloc = { version = "0.1.42" }
# Pure Rust cryptographic or hash crates
sha3 = { version = "0.11.0-pre.3", default-features = false }
base64ct = { version = "1.6.0", default-features = false, features = ["alloc"] }
base16ct = { version = "0.2.0", default-features = false, features = ["alloc"] }
# Other external crates
#cargo add autometrics --features=prometheus-exporter
autometrics = { version = "2.0.0", features = ["prometheus-exporter"] }
anyhow = { version = "1.0" }
arc-swap = { version = "1.7" }
binance-rs-async = { version = "1.3.3", default-features = false, features = ["rustls-tls"] }
blake3 = { version = "1.5" }
bon = { version = "2.0.0" }
chrono = { version = "0.4", features = ["serde"] }
config-file = { version = "0.2" }
ctrlc = { version = "3.4" }
clickhouse-rs = { version = "1.1.0-alpha.1" }
csv = { version = "1.3" }
diesel = { version = "2.2.2", default-features = false, features = ["postgres", "pq-src", "r2d2"] }
diesel_migrations = { version = "2.2.0", default-features = false, features = ["postgres"] }
dotenv = { version = "0.15", default-features = false }
encoding_rs = "0.8"
futures = { version = "0.3" }
hickory-resolver = { version = "0.24", default-features = false, features = ["tokio-runtime"] }
klickhouse = { version = "0.13.0" }
lru = { version = "0.12" }
mini-moka = { version = "0.10.3" }
parquet = { version = "52.0" }
prost = { version = "0.13.0" }
prost-types = { version = "0.13.0", default-features = false }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "blocking", "gzip"] }
rust_decimal = { version = "1.34" }
rust_decimal_macros = { version = "1.34" }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
tonic = { version = "0.12.0", features = ["transport"] }
tonic-build = { version = "0.12.0" }
tonic-health = { version = "0.12.0", default-features = false, features = ["transport"] }
tokio = { version = "1.38", default-features = false, features = ["macros", "net", "rt-multi-thread", "signal"] }
tokio-cron-scheduler = { version = "0.11.0", features = ["signal"] }
tokio-timer = { version = "0.2" }
tokio-tungstenite = { version = "0.23", default-features = false }
warp = "0.3"


# Optimize all crates
[profile.release]
opt-level = 3
strip = true  # Automatically strip debug symbols from the binary
lto = true    # Enable Link Time Optimization (LTO)
codegen-units = 1 # Reduce Parallel Code Generation Units to Increase Optimization


# There's a Cargo feature named profile-overrides
# that lets you override the optimization level of dependencies.
# https://docs.rust-embedded.org/book/unsorted/speed-vs-size.html
[profile.release.package."*"]
opt-level = 3
strip = 'debuginfo'  # Automatically strip debug infos from the binary to reduce size
codegen-units = 1 # Reduce Parallel Code Generation Units to Increase Optimization
