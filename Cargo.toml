dbgw_specs = { path = "queng_system_core/dbgw/dbgw_specs" }
smdb_specs = { path = "queng_system_core/smdb/smdb_specs" }
imdb_specs = { path = "queng_system_core/imdb/imdb_specs" }
mddb_specs = { path = "queng_system_mds/mddb/mddb_specs" }
