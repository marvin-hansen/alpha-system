[workspace]
resolver = "2"

members = [
    "queng_cli/data_importer",
    "queng_cli/smdb_manager",
    "queng_cli/spec_manager",
    "queng_clients/dbgw_client",
    "queng_clients/ims_data_client",
    "queng_clients/rest_client",
    "queng_clients/symdb_client",
    "queng_common",
    "queng_components/config_manager",
    "queng_components/ctx_manager",
    "queng_components/db_query_manager",
    "queng_components/db_surreal_manager",
    "queng_components/dns_manager",
    "queng_components/pattern_manager",
    "queng_components/symbol_manager",
    "queng_proto",
    "queng_providers/cmdb_provider",
    "queng_providers/smdb_provider",
    "queng_sbe/bindings",
    "queng_sbe/sbe_messages",
    "queng_services/cmdb",
    "queng_services/dbgw",
    "queng_services/ims/data/binance_data",
    "queng_services/ims/data/shared_data",
    "queng_services/mdm",
    "queng_services/smdb",
    "queng_services/symdb",
    "queng_specs/db_specs",
    "queng_specs/exchange_specs",
    "queng_specs/file_specs",
    "queng_specs/service_specs",
    "queng_utils/client_utils",
    "queng_utils/proto_utils",
    "queng_utils/service_utils",
]


[workspace.package]
edition = "2021"
rust-version = "1.77.0"
readme = "README.md"
repository = "https://github.com/marvin-hansen/quant-engine"
authors = ["Marvin Hansen <marvin.hansen@gmail.com>"]


[workspace.dependencies]
#
# ==============
# Internal crates
# ==============
#
common = { path = "queng_common" }
# Clients
dbgw_client = { path = "queng_clients/dbgw_client" }
ims_data_client = { path = "queng_clients/ims_data_client" }
rest_client = { path = "queng_clients/rest_client" }
symdb_client = { path = "queng_clients/symdb_client" }
# Components
config_manager = { path = "queng_components/config_manager" }
ctx_manager = { path = "queng_components/ctx_manager" }
db_query_manager = { path = "queng_components/db_query_manager" }
db_surreal_manager = { path = "queng_components/db_surreal_manager" }
dns_manager = { path = "queng_components/dns_manager" }
pattern_manager = { path = "queng_components/pattern_manager" }
symbol_manager = { path = "queng_components/symbol_manager" }
# Proto specs
proto_bindings = { path = "queng_proto" }
# Providers
cmdb_provider = { path = "queng_providers/cmdb_provider" }
smdb_provider = { path = "queng_providers/smdb_provider" }
# SBE
sbe_bindings = { path = "queng_sbe/bindings" }
sbe_messages = { path = "queng_sbe/sbe_messages" }
# Service libs
lib_data_stream = { path = "queng_services/ims/data/shared_data" }
# Specs
db_specs = { path = "queng_specs/db_specs" }
exchange_specs = { path = "queng_specs/exchange_specs" }
file_specs = { path = "queng_specs/file_specs" }
service_specs = { path = "queng_specs/service_specs" }
# Utils
client_utils = { path = "queng_utils/client_utils" }
proto_utils = { path = "queng_utils/proto_utils" }
service_utils = { path = "queng_utils/service_utils" }
#
# ==============
# External crates
# ==============
#
anyhow = { version = "1.0" }
binance-rs-async = "1.3"
chrono = { version = "0.4", features = ["serde"] }
config-file = {version = "0.2"}
ctrlc =  {version = "3.4"}
csv = {version = "1.3"}
encoding_rs = "0.8"
futures = {version = "0.3"}
hickory-resolver = { version = "0.24", default-features = false, features = ["tokio-runtime", "dns-over-rustls", ] }
klickhouse = {version = "0.11"}
lru = {version = "0.12"}
parquet = {version = "51.0" }
prost = {version = "0.12", default-features = false}
prost-types = { version = "0.12", default-features = false }
reqwest = { version = "0.12",  default-features = false, features = ["rustls-tls", "json"]}
rust_decimal = {version = "1.34"}
rust_decimal_macros = {version = "1.34"}
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", default-features = false }

surrealdb = { version = "1.3" }

tonic = { version = "0.11" }
tonic-build = {version = "0.11"}
tonic-health = { version = "0.11"}
tokio-tungstenite = { version = "0.21.0", default-features = false}
tokio = { version = "1", default-features = false,  features = ["macros", "net", "rt-multi-thread", "signal"] }
tokio-timer = { version = "0.2"}
# Fixes Docker Build Error: failed to run custom build command for openssl-sys ...
# https://github.com/sfackler/rust-openssl/issues/2197
openssl = { version = "0.10", features = ["vendored"] }

# Optimize all crates
[profile.release]
opt-level = 3
strip = true  # Automatically strip debug symbols from the binary
lto = true    # Enable Link Time Optimization (LTO)
codegen-units = 1 # Reduce Parallel Code Generation Units to Increase Optimization


# There's a Cargo feature named profile-overrides
# that lets you override the optimization level of dependencies.
# https://docs.rust-embedded.org/book/unsorted/speed-vs-size.html
[profile.release.package."*"]
opt-level = 3
strip = 'debuginfo'  # Automatically strip debug infos from the binary to reduce size
codegen-units = 1 # Reduce Parallel Code Generation Units to Increase Optimization
