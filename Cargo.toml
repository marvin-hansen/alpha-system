pg_imdb = { path = "alpha_infra/postgres/pg_imdb" }
pg_mddb = { path = "alpha_infra/postgres/pg_mddb" }
pg_smdb = { path = "alpha_infra/postgres/pg_smdb" }
pg_cmdb_manager = { path = "alpha_infra/postgres/pg_cmdb_manager" }
pg_imdb_manager = { path = "alpha_infra/postgres/pg_imdb_manager" }
pg_mddb_manager = { path = "alpha_infra/postgres/pg_mddb_manager" }
pg_smdb_manager = { path = "alpha_infra/postgres/pg_smdb_manager" }
