[workspace]
resolver = "2"

members = [
    "queng_clients/*",
    "queng_common/*",
    "queng_components/*",
    "queng_datastructures/*",
    "queng_extensions/*",
    "queng_import/*/*",
    "queng_infra/*/*",
    "queng_integration/data/*",
    "queng_integration/traits/*",
    "queng_message/*",
    "queng_proto/*",
    "queng_sbe/*",
    "queng_services/core/*/*",
    "queng_services/ims/*/*",
    "queng_services/ims_data/*/*",
    "queng_services/mds/*/*",
    "queng_services/templete/*",
    "queng_specs/*/*",
    "queng_utils/*",
]
exclude = [
    "queng_sbe/sbe_schema",
]

[workspace.package]
edition = "2021"
rust-version = "1.82.0"
readme = "README.md"
repository = "https://github.com/marvin-hansen/quant-engine"
authors = ["Marvin Hansen <marvin.hansen@gmail.com>"]

# Linting with clippy
[workspace.lints.clippy]
all = "warn"

# Linting strict mode
[workspace.lints.rust]
# Warnings
deprecated-safe = "warn"
deprecated_safe_2024 = "warn"

# Optimize all crates
[profile.release]
opt-level = 3
strip = true  # Automatically strip debug symbols from the binary
lto = true    # Enable Link Time Optimization (LTO)
codegen-units = 1 # Reduce Parallel Code Generation Units to Increase Optimization

# There's a Cargo feature named profile-overrides
# that lets you override the optimization level of dependencies.
# https://docs.rust-embedded.org/book/unsorted/speed-vs-size.html
[profile.release.package."*"]
opt-level = 3
strip = 'debuginfo'  # Automatically strip debug infos from the binary to reduce size
codegen-units = 1 # Reduce Parallel Code Generation Units to Increase Optimization

