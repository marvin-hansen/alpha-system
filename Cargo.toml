[workspace]
resolver = "2"


members = [
    "cli/*",
    "clients/*",
    "common",
    "components",
    "providers/*",
    "sbe/bindings",
    "sbe/messages",
    "services/*",
    "service_utils",
    "specs"
]


[workspace.package]
# https://doc.rust-lang.org/cargo/reference/workspaces.html
edition = "2021"
rust-version = "1.70"
readme = "README.md"
repository = "https://github.com/marvin-hansen/quant-engine"
authors = ["Marvin Hansen <marvin.hansen@gmail.com>"]


[workspace.dependencies]
autometrics = { version = "0.6.0", features = ["prometheus-exporter"] }
anyhow = "1.0"
async-std = "1.12"
ctrlc = "3.4"
futures = "0.3"
log = "0.4"
prost = "0.12.3"
prost-types = { version = "0.12", default-features = false }
rand = "0.8"
rust_decimal = "1.33"
rust_decimal_macros = "1.33"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
surrealdb = { version = "1", features = ["kv-mem"] }
tarpc = { version = "0.33", features = ["full"] }
tokio = { version = "1", features = ["macros", "net", "rt-multi-thread", "signal"] }
tonic-health = "0.10"
tonic = "0.10"
tonic-build = "0.10.2"
tracing = { version = "0.1" }
tracing-opentelemetry = "0.22.0"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
warp = { version = "0.3", features = ["multipart"] }
zenoh = {version = "0.10.0-rc",  features = [   "transport_quic", "transport_tcp", "transport_tls", "transport_udp",]}


# Optimize all crates
[profile.release]
opt-level = 3
strip = true  # Automatically strip debug symbols from the binary
lto = true    # Enable Link Time Optimization (LTO)
codegen-units = 1 # Reduce Parallel Code Generation Units to Increase Optimization


# There's a Cargo feature named profile-overrides
# that lets you override the optimization level of dependencies.
# https://docs.rust-embedded.org/book/unsorted/speed-vs-size.html
[profile.release.package."*"]
opt-level = 3
strip = true  # Automatically strip debug symbols from the binary to reduce size
codegen-units = 1 # Reduce Parallel Code Generation Units to Increase Optimization
