binance_spot_data_integration = { path = "alpha_integration/data/binance_spot_data_integration" }
binance_spot_testnet_data_integration = { path = "alpha_integration/data/binance_spot_testnet_data_integration" }
binance_usd_futures_data_integration = { path = "alpha_integration/data/binance_usd_futures_data_integration" }
binance_usd_futures_testnet_data_integration = { path = "alpha_integration/data/binance_usd_futures_testnet_data_integration" }

