proto_imdb = { path = "alpha_proto/proto_imdb" }
proto_imdb_utils = { path = "alpha_proto/proto_imdb_utils" }
proto_mddb = { path = "alpha_proto/proto_mddb" }
proto_mddb_utils = { path = "alpha_proto/proto_mddb_utils" }
