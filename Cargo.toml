[workspace]
resolver = "2"

members = [
    "alpha_common/*",
    "alpha_components/*",
    "alpha_datastructures/*",
    "alpha_errors/*",
    "alpha_extensions/*",
    "alpha_import/*/*",
    "alpha_infra/postgres/*",
    "alpha_integration/data/*",
    "alpha_macros/*",
    "alpha_proto/*",
    "alpha_sbe/*",
    "alpha_specs/*/*",
    "alpha_system/core/*/*",
    "alpha_system/ims_data/*/*",
    "alpha_system/mds/*/*",
    "alpha_system/messaging/*",
    "alpha_system/template/*",
    "alpha_traits/*",
    "alpha_transport/*",
    "alpha_utils/*",
    "alpha_utils_test/*",
]
exclude = [
    "alpha_sbe/sbe_schema",
]

[workspace.package]
edition = "2024"
rust-version = "1.85.0"
readme = "README.md"
repository = "https://github.com/marvin-hansen/quant-engine"
authors = ["Marvin Hansen <marvin.hansen@gmail.com>"]

[workspace.dependencies]
