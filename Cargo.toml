trait_event_consumer = { path = "queng_traits/trait_event_consumer" }
trait_event_processor = { path = "queng_traits/trait_event_processor" }
trait_exec_integration = { path = "queng_traits/trait_exec_integration" }

# Utils
client_utils = { path = "queng_utils/client_utils" }
crypto_utils = { path = "queng_utils/crypto_utils" }
encoding_utils = { path = "queng_utils/encoding_utils" }
math_utils = { path = "queng_utils/math_utils" }
# Test utils
iggy_test_utils = { path = "queng_utils_test/iggy_test_utils" }

# ==============
# External crates
# ==============
# Proc Macro Dependencies
async-trait = { version = "0.1" }
enum_dispatch = { version = "0.3" }
trait-variant = { version = "0.1" }
syn = { version = "2.0", features = ["full", "extra-traits"] }
quote = "1.0"
# Dependencies that I maintained
docker_utils = { version = "0.2" }
service_utils = { version = "0.2" }
# Regular dependencies
base16ct = { version = "0.2", default-features = false, features = ["alloc"] }
blake3 = { version = "1.5", default-features = false }
bytes = { version = "1.8" }
chrono = { version = "0.4", features = ["serde"] }
crossbeam = {version = "0.8"}
diesel = { version = "2.2", default-features = false, features = ["postgres", "pq-src", "r2d2"] }
diesel_migrations = { version = "2.2", default-features = false, features = ["postgres"] }
futures = { version = "0.3" }
futures-util = { version = "0.3" }
hickory-resolver = { version = "0.24", default-features = false, features = ["tokio-runtime"] }
iggy = { version = "0.6.200" }
klickhouse = { version = "0.13" }
mimalloc = { version = "0.1.43" }
prost = { version = "0.13.4" }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "blocking", "gzip"] }
rust_decimal = { version = "1.36" }
rust_decimal_macros = { version = "1.36" }
rustls = { version = "0.23.23", features = ["ring"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }
sha3 = { version = "0.11.0-pre.4", default-features = false }
tokio = { version = "1.42", default-features = false, features = ["macros", "net", "rt-multi-thread", "signal", "time"] }
tokio-tungstenite = { version = "0.26", features = ["rustls-tls-webpki-roots"]}
tonic = { version = "0.12", features = ["transport"] }
tonic-build = { version = "0.12" }
tonic-health = { version = "0.12", default-features = false, features = ["transport"] }
warp = { version = "0.3" }
# Depdendencies for cloudflare workers that are not build with Bazel
console_error_panic_hook = { version = "0.1" }
worker = { version = "0.5", default-features = false }
worker-macros = { version = "0.5" }
# Dev dependencies
criterion = { version = "0.5", features = ["html_reports"] }

# Linting with clippy
[workspace.lints.clippy]
all = "warn"

# Linting strict mode
[workspace.lints.rust]
# Warnings
deprecated-safe = "warn"
deprecated_safe_2024 = "warn"
rust-2024-compatibility = "warn"


# Optimize all crates
[profile.release]
opt-level = 3
strip = true  # Automatically strip debug symbols from the binary
lto = true    # Enable Link Time Optimization (LTO)
codegen-units = 1 # Reduce Parallel Code Generation Units to Increase Optimization


# There's a Cargo feature named profile-overrides
# that lets you override the optimization level of dependencies.
# https://docs.rust-embedded.org/book/unsorted/speed-vs-size.html
[profile.release.package."*"]
opt-level = 3
strip = 'debuginfo'  # Automatically strip debug infos from the binary to reduce size
codegen-units = 1 # Reduce Parallel Code Generation Units to Increase Optimization
