[workspace]
resolver = "2"

members = [
    "queng_common/*",
    "queng_components/*",
    "queng_datastructures/*",
    "queng_extensions/*",
    "queng_import/*/*",
    "queng_infra/*/*",
    "queng_integration/data/*",
    "queng_message/*",
    "queng_macros/*",
    "queng_proto/*",
    "queng_sbe/*",
    "queng_specs/*/*",
    "queng_system_core/*/*",
    "queng_system_ims_clients/*",
    "queng_system_ims_data/*/*",
    "queng_system_mds/*/*",
    "queng_template/*",
    "queng_traits/*",
    "queng_utils/*",
    "queng_utils_test/*",
]
exclude = [
    "queng_sbe/sbe_schema",
]

[workspace.package]
edition = "2024"
rust-version = "1.85.0"
readme = "README.md"
repository = "https://github.com/marvin-hansen/quant-engine"
authors = ["Marvin Hansen <marvin.hansen@gmail.com>"]

[workspace.dependencies]
# ==============
# Internal Aliases
# ==============

# Servide clients
# Core
cmdb_client = { path = "queng_system_core/cmdb/cmdb_client" }
smdb_client = { path = "queng_system_core/smdb/smdb_client" }
imdb_client = { path = "queng_system_core/imdb/imdb_client" }
ims_data_client = { path = "queng_system_ims_clients/ims_data_client" }
# MDS
mddb_client = { path = "queng_system_mds/mddb/mddb_client" }

# Common
common_config = { path = "queng_common/common_config" }
common_data_bar = { path = "queng_common/common_data_bar" }
common_database = { path = "queng_common/common_database" }
common_env = { path = "queng_common/common_env" }
common_errors = { path = "queng_common/common_errors" }
common_exchange = { path = "queng_common/common_exchange" }
common_ims = { path = "queng_common/common_ims" }
common_message = { path = "queng_common/common_message" }
common_metadata = { path = "queng_common/common_metadata" }
common_order = { path = "queng_common/common_order" }
common_orderbook = { path = "queng_common/common_orderbook" }
common_platform = { path = "queng_common/common_platform" }
common_service = { path = "queng_common/common_service" }
common_trade = { path = "queng_common/common_trade" }

# Components
config_manager = { path = "queng_components/config_manager" }
environment_manager = { path = "queng_components/environment_manager" }
pattern_manager = { path = "queng_components/pattern_manager" }

# Datastructures
ring_buffer = { path = "queng_datastructures/ring_buffer" }
sliding_window = { path = "queng_datastructures/sliding_window" }

# Extensions
common_data_bar_ext = { path = "queng_extensions/common_data_bar_ext" }
common_order_ext = { path = "queng_extensions/common_order_ext" }
cow_ext = { path = "queng_extensions/cow_ext" }

# Import
# Core
config_import = { path = "queng_import/core/config_import" }
integration_import = { path = "queng_import/core/integration_import" }
metadata_import = { path = "queng_import/core/metadata_import" }
service_import = { path = "queng_import/core/service_import" }
# Kaiko
kaiko_download = { path = "queng_import/kaiko/kaiko_download" }
kaiko_import = { path = "queng_import/kaiko/kaiko_import" }
kaiko_test_utils = { path = "queng_import/kaiko/kaiko_test_utils" }
# Utils
pg_import_print_utils = { path = "queng_import/postgres/pg_import_print_utils" }

# Infra
# Clickhouse DB
clickhouse_config_manager = { path = "queng_infra/clickhouse/clickhouse_config_manager" }
clickhouse_utils = { path = "queng_infra/clickhouse/clickhouse_utils" }
db_clickhouse_manager = { path = "queng_infra/clickhouse/db_clickhouse_manager" }
# Postgres DB
pg_cmdb = { path = "queng_infra/postgres/pg_cmdb" }
pg_imdb = { path = "queng_infra/postgres/pg_imdb" }
pg_mddb = { path = "queng_infra/postgres/pg_mddb" }
pg_smdb = { path = "queng_infra/postgres/pg_smdb" }
pg_cmdb_manager = { path = "queng_infra/postgres/pg_cmdb_manager" }
pg_imdb_manager = { path = "queng_infra/postgres/pg_imdb_manager" }
pg_mddb_manager = { path = "queng_infra/postgres/pg_mddb_manager" }
pg_smdb_manager = { path = "queng_infra/postgres/pg_smdb_manager" }
postgres_common = { path = "queng_infra/postgres/postgres_common" }
