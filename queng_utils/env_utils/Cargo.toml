[package]
name = "env_utils"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
readme.workspace = true
repository.workspace = true
authors.workspace = true


[[bin]]
name = "test_docker_bin"
path = "src/docker_bin/main.rs"


[[bin]]
name = "test_env_bin"
path = "src/env_util_bin/main.rs"


[lib]
name = "env_utils"
path = "src/lib.rs"


[dependencies]
# Internal crates
common = {workspace = true}
db_utils = {workspace = true}
# External crates
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"] }
serde_json = "1.0.115"

