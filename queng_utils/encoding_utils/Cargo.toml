[package]
name = "encoding_utils"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
readme.workspace = true
repository.workspace = true
authors.workspace = true
description = "High-performance string-to-integer encoding utilities"


[lints]
workspace = true

[dependencies]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "string_int64_codec_bench"
harness = false

[[bench]]
name = "string_int64_pair_codec_bench"
harness = false

[[bench]]
name = "string_int128_codec_bench"
harness = false

[[example]]
name = "string_int64_example"
path = "examples/string_int64_example.rs"

[[example]]
name = "string_int128_example"
path = "examples/string_int128_example.rs"

[[example]]
name = "string_int64_pair_example"
path = "examples/string_int64_pair_example.rs"
