---
apiVersion: v1
kind: Service
metadata:
  name: cmdb-service
  namespace: default

spec:
  selector:
    app: cmdb
  sessionAffinity: None
  type: ClusterIP
  ports:
    - name: main-port
      port: 9090
      protocol: TCP
      targetPort: 9090
    - name: metrics-port
      port: 8080
      protocol: TCP
      targetPort: 8080


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmdb
  namespace: default

spec:
  replicas: 1
  selector:
    matchLabels:
      app: cmdb
  template:
    metadata:
      labels:
        app: cmdb
    spec:
      containers:
        - name: cmdb
          image: gcr.io/future-309012/cmdb:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ENV
              value: "CLUSTER"

            - name: DNS_SERVER
              valueFrom:
                secretKeyRef:
                  name: dns-access
                  key: DNS_SERVER

          ports:
            - containerPort: 9090
            - containerPort: 8080

# Define a gRPC liveness probe
#  https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#define-a-grpc-liveness-probe
          livenessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 3
            failureThreshold: 1
            periodSeconds: 3

          startupProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 1
            failureThreshold: 10
            periodSeconds: 3

